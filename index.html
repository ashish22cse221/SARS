<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url('bg1.jpg'); /* Updated background image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        .launch-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo {
            max-width: 300px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: brightness(1.2) contrast(1.4);
        }
        .logo.show {
            opacity: 1;
            transform: scale(1);
        }
        .loading-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 20, 0.8); /* Slightly transparent dark background */
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .advanced-loader {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(#00ffff 0deg, transparent 270deg); /* Already cyan */
            animation: rotate 2s linear infinite;
            position: relative;
        }
        .advanced-loader::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #00ffff; /* Already cyan */
            letter-spacing: 4px;
            margin-top: 20px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="launch-container">
        <img src="LOGO.png" alt="Field.io" class="logo"> 
        
        <div class="loading-screen">
            <div class="advanced-loader"></div>
            <h2 class="loading-text">Initializing</h2>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.querySelector('.logo');
            const loadingScreen = document.querySelector('.loading-screen');

            // Logo popup animation
            setTimeout(() => {
                logo.classList.add('show');
            }, 500);

            // Transition to loading screen
            setTimeout(() => {
                logo.style.display = 'none';
                loadingScreen.style.display = 'flex';
            }, 3000);

            // Redirect after loading
            setTimeout(() => {
                window.location.href = 'main.html';
            }, 7000);
        });
    </script>
</body>
</html>
